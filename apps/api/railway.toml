[build]
builder = "nixpacks"
buildCommand = "corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && pnpm --filter @lucreii/api build"

[deploy]
startCommand = "corepack enable && corepack prepare pnpm@latest --activate && pnpm --filter @lucreii/api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10